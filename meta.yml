---
# Contrat déclaratif consommé par la CLI dsoxlab.
# https://github.com/stephrobert/dsoxlab — schéma documenté dans le CLAUDE.md
# du dépôt dsoxlab.

repo:
  id: linux-dsoxlab-training
  category: linux
  title: "Linux DevSecOps Training — RHCSA + LFCS 2026"
  blog_url: "https://blog.stephane-robert.info/docs/admin-serveurs/linux/"
  description: |
    Plateforme de labs pédagogiques pour la formation Linux du blog
    Stéphane Robert. Couvre les certifications RHCSA EX200v10 (RHEL 10) et
    LFCS 2026 (multi-distrib). Chaque lab est jumelé à une page MDX du site.

# Topologie d'infrastructure. Le provider courant est sélectionné via
# `infra.provider` ci-dessous, ou surchargé par DSOXLAB_PROVIDER=<name>.
# Les IPs ne sont plus déclarées : Terraform les attribue dynamiquement
# (DHCP statique pour kvm, IP privée auto pour les clouds).
infra:
  # Provider courant. Override par DSOXLAB_PROVIDER=<name>.
  # Pour basculer définitivement entre providers : modifie cette
  # ligne ou exporte DSOXLAB_PROVIDER dans ton shell.
  # Liste des providers candidats. L'apprenant choisit via :
  #   dsoxlab use --provider kvm        (persisté en session)
  #   DSOXLAB_PROVIDER=outscale dsoxlab provision   (one-shot)
  # Rétro-compat : valeur string pour single provider toujours acceptée.
  provider:
    - kvm
    - incus
    - outscale
  network: lab-linux
  cidr: 10.10.30.0/24

  # ATTENTION : l'IP et la MAC de chaque hôte sont dérivées de sa POSITION dans
  # cette liste (templates/terraform/kvm/main.tf : `idx + 11` et `idx + 16`).
  # Insérer un hôte au milieu réattribue donc les adresses de tous les suivants,
  # ce que le provider libvirt refuse en cours de route
  # (« ips[0].dhcp.hosts: element N has vanished »). Tout nouvel hôte s'ajoute
  # EN FIN DE LISTE.
  hosts:
    - name: alma-rhcsa-1.lab
      distro: alma10
      role: rhcsa-primary
      ram_mb: 2048
      vcpu: 2
      disk_gb: 20
      # Disque additionnel pour le capstone RHCSA (tâches 1-3 :
      # partitionnement GPT + LVM + mount /data). Apparaît dans la
      # VM comme /dev/vdb (kvm/incus) ou /dev/xvdb (outscale).
      extra_disk_gb: 10
    - name: alma-rhcsa-2.lab
      distro: alma10
      role: rhcsa-secondary
      ram_mb: 1536
      vcpu: 1
      disk_gb: 15
    - name: ubuntu-lfcs-1.lab
      distro: ubuntu24
      role: lfcs-debian
      ram_mb: 1536
      vcpu: 1
      disk_gb: 15
      # Disque additionnel pour lfcs-storage-quotas (formatage + montage
      # avec usrquota/grpquota + quotas utilisateur). Apparaît comme
      # /dev/vdb (kvm/incus). Les quotas exigent un vrai noyau → KVM.
      extra_disk_gb: 5
  providers:
    kvm:
      libvirt_uri: "qemu:///system"
      bridge_name: "virbr-linux"

    outscale:
      # Profil dans ~/.osc/config.json (lu par dsoxlab → access_key,
      # secret_key, region passés à Terraform via env vars).
      # Override : DSOXLAB_OUTSCALE_PROFILE=<name>
      profile: default

      # CIDR du Net Outscale (override de infra.cidr) : /22 minimum
      # pour pouvoir y découper 2 subnets /24 (public + privé).
      cidr: "10.20.0.0/22"

      # Paramètres spécifiques au lab (les credentials et la région
      # viennent du profil ci-dessus, pas d'ici).
      vm_type_default: "tinav5.c2r4p1"
      vm_type_bastion: "tinav5.c1r1p1"
      bastion_user: "student"

      # Images officielles Outscale eu-west-2, cycle 2026-04-14.
      # Re-piner via :
      #   oapi-cli --profile default ReadImages \
      #     --Filters '{"ImageNames":["*AlmaLinux*"],"AccountAliases":["Outscale"]}' \
      #     | jq -r '.Images[] | "\(.ImageId)\t\(.ImageName)"'
      image_id_alma10: "ami-fc11420f"     # AlmaLinux-10-2026-04-14
      image_id_ubuntu24: "ami-b29cea33"   # Ubuntu-24.04-2026-04-14
      # image_id_bastion : défaut = image_id_ubuntu24 (cf. template)

    # Providers à venir (Phase 9 du REFACTORING-PLAN) :
    # aws, gcp, azure, proxmox, vagrant, incus

# Sections pédagogiques. L'ordre des labs sous chaque section pilote
# `dsoxlab list-labs` et `dsoxlab next`.
sections:
  - id: l1
    title: "Fondamentaux (l1)"
    description: "Découvrir Linux, le shell, les fichiers — runtime: shell."
    labs:
      - linux/l1/l1-discover-linux-map
      - linux/l1/l1-choose-distro
      - linux/l1/l1-prepare-vm
      - linux/l1/l1-first-terminal
      - linux/l1/l1-read-a-command
      - linux/l1/l1-get-help
      - linux/l1/l1-linux-filesystem
      - linux/l1/l1-navigate-filesystem
      - linux/l1/l1-paths-absolute-relative
      - linux/l1/l1-redirections-pipes
      - linux/l1/l1-grep-regex
      - linux/l1/l1-text-processing
      - linux/l1/l1-find-files
      - linux/l1/l1-tar-archives
      - linux/l1/l1-permissions-ugo
      - linux/l1/l1-links-hard-sym
      - linux/l1/l1-bash-script
      - linux/l1/l1-git-basics
      - linux/l1/l1-env-profiles
      - linux/l1/l1-ssl-certificates

  - id: l2
    title: "Exploiter + Maintenir (l2)"
    description: "Scripts, services, paquets, réseau, sécurité de base — runtime: vm."
    labs:
      - linux/l2/l2-swap-management
      - linux/l2/l2-fstab-persist-uuid
      - linux/l2/l2-partition-gpt
      - linux/l2/l2-filesystem-create-xfs
      - linux/l2/l2-disk-space-troubleshoot
      - linux/l2/l2-storage-performance
      - linux/l2/l2-lvm-extend-persist
      - linux/l2/l2-nfs-mount-persist
      - linux/l2/l2-autofs-ondemand
      - linux/l2/l2-raid-mdadm
      - linux/l2/l2-luks-encryption
      - linux/l2/l2-user-lifecycle
      - linux/l2/l2-password-policy
      - linux/l2/l2-sudo-delegation
      - linux/l2/l2-acl-posix
      - linux/l2/l2-collaborative-setgid
      - linux/l2/l2-package-management
      - linux/l2/l2-repo-configure

  - id: l3
    title: "Services + Dépannage (l3)"
    description: "systemd, planification, journaux, noyau, récupération — runtime: vm."
    labs:
      - linux/l3/l3-boot-target
      - linux/l3/l3-grub-kernel-args
      - linux/l3/l3-service-create-unit
      - linux/l3/l3-service-diagnose
      - linux/l3/l3-journald-persist
      - linux/l3/l3-scheduling-cron
      - linux/l3/l3-scheduling-at
      - linux/l3/l3-scheduling-timers
      - linux/l3/l3-app-constraints
      - linux/l3/l3-sysctl-persist
      - linux/l3/l3-process-signals-priority
      - linux/l3/l3-tuned-profile
      - linux/l3/l3-fs-readonly-recover
      - linux/l3/l3-ssh-access-recovery

  - id: l4
    title: "Réseau, Sécurité & Conteneurs (l4)"
    description: "chrony, NetworkManager, firewalld, SSH, SELinux, podman — runtime: vm."
    labs:
      - linux/l4/l4-ntp-sync
      - linux/l4/l4-network-static-persist
      - linux/l4/l4-network-troubleshoot
      - linux/l4/l4-firewall-persist
      - linux/l4/l4-ssh-key-auth-harden
      - linux/l4/l4-podman-basic
      - linux/l4/l4-podman-systemd-persist
      - linux/l4/l4-podman-images
      - linux/l4/l4-selinux-boolean-port
      - linux/l4/l4-selinux-context-fix
      - linux/l4/l4-selinux-diagnose-avc
      - linux/l4/l4-nat-portforward
      - linux/l4/l4-ldap-integration
      - linux/l4/l4-reverse-proxy-lb
      - linux/l4/l4-bridge-bonding

  - id: lfcs
    title: "Variantes Debian/Ubuntu"
    description: "Le delta Debian du LFCS : les objectifs que le curriculum RHEL de l1-l4 ne couvre pas (apt, ufw, AppArmor, netplan…). La vue LFCS complète passe par certification_tags, pas par cette section."
    labs:
      - linux/lfcs/lfcs-package-apt
      - linux/lfcs/lfcs-firewall-ufw
      - linux/lfcs/lfcs-apparmor
      - linux/lfcs/lfcs-netplan-static
      - linux/lfcs/lfcs-storage-quotas
      - linux/lfcs/lfcs-mount-cifs

  - id: drills
    title: "Drills — conditions d'examen"
    description: "Exercices courts en conditions d'examen : plusieurs tâches, sans indices, chronométrés. Partagés entre RHCSA et LFCS via certification_tags et joués sur la distrib de ton choix (dsoxlab check --target rhel|ubuntu)."
    labs:
      - linux/drills/drill-essential-commands
      - linux/drills/drill-users-groups
      - linux/drills/drill-systemd
      - linux/drills/drill-storage
      - linux/drills/drill-packages
      - linux/drills/drill-firewall
      - linux/drills/drill-selinux
      - linux/drills/drill-apparmor
      - linux/drills/drill-network

  - id: capstones
    title: "Capstones"
    description: "Synthèses transverses — projets de fin de bloc."
    labs:
      - linux/capstones/rhcsa-mock-exam
      - linux/capstones/lfcs-mock-exam
