---
# Solution formateur — lab depanner/services-processus/service-crash-loop.
# Idempotent : ré-exécutable sans erreur.
#
# Joué par la fixture pytest _apply_lab_state (via ansible-runner) avant
# les tests pytest+testinfra du challenge.
#
# À chiffrer avec ansible-vault avant tout commit (la commande
# 'dsoxlab instructor solutions lock' le fait pour toutes les solutions
# en clair de solution/).

- name: Fix demo-crashloop configuration (durable)
  hosts: lab_target
  become: true
  gather_facts: false
  tasks:

    - name: Create /etc/demo-crashloop directory with strict permissions
      ansible.builtin.file:
        path: /etc/demo-crashloop
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Deploy minimal config (port: 8080)
      ansible.builtin.copy:
        dest: /etc/demo-crashloop/config.yml
        owner: root
        group: root
        mode: "0644"
        content: |
          port: 8080

    - name: Restart demo-crashloop (no daemon-reload — unit file unchanged)
      ansible.builtin.systemd:
        name: demo-crashloop.service
        state: restarted

    - name: Ensure service is enabled (persistance reboot — critère RHCSA)
      ansible.builtin.systemd:
        name: demo-crashloop.service
        enabled: true

    - name: Wait until service is active
      ansible.builtin.command:
        cmd: systemctl is-active demo-crashloop.service
      register: svc_state
      until: svc_state.stdout == "active"
      retries: 10
      delay: 1
      changed_when: false
