# Contribution gate for a CONTENT repo (lab catalog), not a Python package.
# zizmor statically analyzes the workflows first (fast security gate); the
# heavier jobs only run once it passes. No build, no publish, no artifact upload.
#
# Hardening baseline: every action is pinned to a full commit SHA, the default
# token has no permissions, each job grants only what it needs, checkout never
# persists credentials, and jobs are time-boxed.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Deny-by-default: jobs opt into the scopes they need, nothing is inherited.
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast security gate — the other jobs depend on it.
  zizmor:
    name: Zizmor (workflow static analysis)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          version: "1.26.1"
          advanced-security: false

  # Validate the declarative contract + lint the lab Python (tests, conftest).
  validate:
    name: Validate labs (contract + lint)
    needs: zizmor
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      # This repo declares several providers; validate-structure needs one
      # active even though CI provisions nothing.
      DSOXLAB_PROVIDER: kvm
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Validate the meta.yml + lab.yaml contract
        run: uvx dsoxlab validate-structure

      - name: Lint lab Python (ruff)
        run: uvx ruff check .

  # Static analysis of the repo's Python (lab tests, conftest). Findings post to
  # the Security tab — no artifact is published.
  codeql:
    name: CodeQL (python)
    needs: zizmor
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: python
          build-mode: none # Python is interpreted, no build step to observe

      - name: Analyze
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
