version: 2
updates:
  # Garde les actions GitHub (épinglées par SHA) à jour — l'écosystème
  # pertinent pour ce dépôt de contenu.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
    # Laisser décanter une nouvelle release : un paquet compromis est
    # généralement retiré en quelques jours, un cooldown réduit la fenêtre.
    # Quarantaine graduée : plus le saut de version est large, plus le risque
    # d'une release compromise ou régressive est élevé, plus on attend.
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3

  # Pas d'écosystème "uv" ici : ce dépôt de contenu n'a aucune dépendance
  # Python à builder (pyproject.toml : package = false, dependencies = []).
  # La seule dev-dep est dsoxlab, déclaré en source chemin local éditable
  # (`../dsoxlab`) que Dependabot ne peut pas atteindre — il abandonne sur
  # `path_dependencies_not_reachable`. dsoxlab est suivi et publié dans son
  # propre dépôt ; ici on ne surveille que les actions GitHub.
