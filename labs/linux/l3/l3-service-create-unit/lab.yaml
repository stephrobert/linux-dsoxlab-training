  default: rhel
  snapshot_required: false
  targets:
    - name: rhel
      host: alma-rhcsa-1.lab
      label_en: "AlmaLinux 10 (unit file, daemon-reload, enable --now)"
      label_fr: "AlmaLinux 10 (unit file, daemon-reload, enable --now)"
