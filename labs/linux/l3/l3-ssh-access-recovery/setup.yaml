---
# État initial : un drop-in sshd_config.d contient une directive INVALIDE, et
# sshd -t échoue. La directive fautive n'est pas nommée ici : l'identifier est
# l'exercice, et ce fichier est sous les yeux de l'apprenant. Le sshd EN COURS
# n'est pas
# touché (config relue seulement au reload), donc la connexion actuelle survit,
# mais un reload/reboot casserait l'accès. L'apprenant répare. Joué par dsoxlab run.
- name: Setup ssh-access-recovery lab
  hosts: lab_target
  become: true
  gather_facts: false
  tasks:
    - name: Ensure the drop-in directory exists
      ansible.builtin.file:
        path: /etc/ssh/sshd_config.d
        state: directory
        mode: "0755"

    - name: Write a broken sshd drop-in (invalid MaxAuthTries value)
      ansible.builtin.copy:
        dest: /etc/ssh/sshd_config.d/99-lab.conf
        mode: "0600"
        content: |
          # Config du lab — contient une erreur volontaire.
          PermitRootLogin no
          MaxAuthTries beaucoup-trop

    - name: Brief the learner (do NOT reload a broken config)
      ansible.builtin.debug:
        msg: >-
          Un drop-in de /etc/ssh/sshd_config.d/ a une directive invalide : sshd -t
          échoue, donc un reload ou un reboot couperait l'accès SSH. Répare avant
          d'appliquer, garde la directive de sécurité posée par le drop-in, et ne
          recharge jamais une config que sshd -t rejette. Garde une seconde
          session SSH ouverte pendant la manipulation.
