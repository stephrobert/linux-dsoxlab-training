id: l3-ssh-access-recovery
title: "Repair a broken sshd config before it locks you out"
description: "A drop-in left an invalid directive: sshd -t fails, so the next reload or reboot would kill remote access. Fix the config, keep root login disabled, and reload cleanly."
section: linux
type: lab
level: l3
track:
  - depanner
  - rhcsa
  - lfcs
skills:
  - sshd
  - sshd_config
  - sshd -t
  - troubleshooting
difficulty: intermediate
estimated_time: 25m
runtime:
  type: vm
  default: rhel
  snapshot_required: false
  targets:
    - name: rhel
      host: alma-rhcsa-1.lab
      label_en: "AlmaLinux 10 (sshd_config.d, sshd -t)"
      label_fr: "AlmaLinux 10 (sshd_config.d, sshd -t)"
distros:
  - rhel10
  - almalinux10
  - ubuntu24.04
doc_url: https://blog.stephane-robert.info/docs/admin-serveurs/linux/depanner/perte-acces-ssh/
validation:
  functional: true
  security: true
  persistence_after_reboot: true
certification_tags:
  - rhcsa
  - lfcs
