id: l3-fs-readonly-recover
title: "Recover a read-only mount caused by a broken fstab"
description: "A bad /etc/fstab option left /srv/data mounted read-only. Fix the entry, remount read-write, and make mount -a clean again."
section: l3
bloc_order: 13
lab_type: lab
level: l3
track:
  - depanner
skills:
  - fstab
  - mount
  - remount
  - troubleshooting
difficulty: intermediate
estimated_time: 25m
runtime:
  type: vm
  # On reste sur le poste : c'est à l'apprenant de taper son ssh vers
  # la machine du lab, et dsoxlab n'est installé que sur le poste.
  session: local
  default: rhel
  snapshot_required: false
  targets:
    - name: rhel
      host: alma-rhcsa-1.lab
      label_en: "AlmaLinux 10 (fstab, mount -a, remount rw)"
      label_fr: "AlmaLinux 10 (fstab, mount -a, remount rw)"
distros:
  - rhel10
  - almalinux10
  - ubuntu24.04
doc_url: https://blog.stephane-robert.info/docs/admin-serveurs/linux/depanner/systeme-fichiers-lecture-seule/
validation:
  functional: true
  security: false
  persistence_after_reboot: true
certification_tags:
  - rhcsa
  - lfcs
