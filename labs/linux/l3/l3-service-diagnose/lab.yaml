id: l3-service-diagnose
title: "Diagnose and fix a systemd service stuck in a crash loop"
description: "A systemd service keeps restarting because of a missing config file. Use systemctl + journalctl to find the root cause and fix it permanently."
section: linux
lab_type: lab
level: l3
track:
  - depanner
skills:
  - systemd
  - journalctl
  - service-management
  - debug
difficulty: intermediate
estimated_time: 30m

# Multi-targets : l'apprenant choisit RHEL ou Ubuntu via --target.
# Le même setup.yaml/cleanup.yaml/solution.yaml fonctionne sur les deux
# (ansible.builtin.systemd, file, copy sont portables).
runtime:
  type: vm
  # On reste sur le poste : c'est à l'apprenant de taper son ssh vers
  # la machine du lab, et dsoxlab n'est installé que sur le poste.
  session: local
  default: rhel
  snapshot_required: false
  targets:
    - name: rhel
      host: alma-rhcsa-1.lab
      label_en: "AlmaLinux 10 (systemd + journalctl + SELinux)"
      label_fr: "AlmaLinux 10 (systemd + journalctl + SELinux)"
    - name: ubuntu
      host: ubuntu-lfcs-1.lab
      label_en: "Ubuntu 24.04 (systemd + journalctl + AppArmor)"
      label_fr: "Ubuntu 24.04 (systemd + journalctl + AppArmor)"

distros:
  - rhel10
  - almalinux10
  - ubuntu24.04
doc_url: https://blog.stephane-robert.info/docs/admin-serveurs/linux/depanner/service-ne-demarre-pas/
validation:
  functional: true
  security: false
  persistence_after_reboot: true
certification_tags:
  - rhcsa
  - lfcs
