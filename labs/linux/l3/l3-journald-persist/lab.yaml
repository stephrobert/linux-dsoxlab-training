id: l3-journald-persist
title: "Make the systemd journal persistent across reboots"
description: "By default logs vanish on reboot. Enable persistent journald storage so /var/log/journal keeps history — proven by config, directory and a real journal file."
section: l3
bloc_order: 5
lab_type: lab
level: l3
track:
  - exploiter
skills:
  - journald
  - journalctl
  - logging
difficulty: intermediate
estimated_time: 20m
runtime:
  type: vm
  # On reste sur le poste : c'est à l'apprenant de taper son ssh vers
  # la machine du lab, et dsoxlab n'est installé que sur le poste.
  session: local
  default: rhel
  snapshot_required: false
  targets:
    - name: rhel
      host: alma-rhcsa-1.lab
      label_en: "AlmaLinux 10 (journald.conf, /var/log/journal)"
      label_fr: "AlmaLinux 10 (journald.conf, /var/log/journal)"
distros:
  - rhel10
  - almalinux10
  - ubuntu24.04
doc_url: https://blog.stephane-robert.info/docs/admin-serveurs/linux/exploiter/systemd/journaux/
validation:
  functional: true
  security: false
  persistence_after_reboot: true
certification_tags:
