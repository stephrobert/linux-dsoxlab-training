---
# État initial : pas de timer de lab. L'apprenant crée le .service + .timer et
# l'active. Joué par dsoxlab run.
- name: Setup scheduling-timers lab
  hosts: lab_target
  become: true
  gather_facts: false
  tasks:
    - name: Clean slate — remove any lab timer/service
      ansible.builtin.shell:
        cmd: |
          systemctl disable --now labbackup.timer 2>/dev/null || true
          rm -f /etc/systemd/system/labbackup.timer /etc/systemd/system/labbackup.service
          systemctl daemon-reload
        chdir: /
      changed_when: false

    - name: Brief the learner
      ansible.builtin.debug:
        msg: >-
          La machine part d'un état vierge : aucune unité de lab ne subsiste et
          systemd a été rechargé. L'état attendu est décrit par
          « dsoxlab challenge l3-scheduling-timers », la méthode par
          « dsoxlab course l3-scheduling-timers ». Aucune commande n'est donnée
          ici : les indices sont dans « dsoxlab hint l3-scheduling-timers ».
