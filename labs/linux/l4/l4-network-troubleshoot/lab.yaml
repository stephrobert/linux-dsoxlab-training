  # On reste sur le poste : c'est à l'apprenant de taper son ssh vers
  # la machine du lab, et dsoxlab n'est installé que sur le poste.
  session: local
  default: rhel
  snapshot_required: false
  targets:
    - name: rhel
      host: alma-rhcsa-1.lab
      label_en: "AlmaLinux 10 (nmcli, ip)"
      label_fr: "AlmaLinux 10 (nmcli, ip)"
distros:
  - rhel10
  - almalinux10
doc_url: https://blog.stephane-robert.info/docs/admin-serveurs/linux/reseau/diagnostic/
