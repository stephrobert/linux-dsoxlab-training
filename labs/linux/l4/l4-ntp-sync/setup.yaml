---
# État initial : horloge déréglée (mauvais fuseau, NTP désactivé, chronyd arrêté
# et non activé). L'apprenant resynchronise. Joué par dsoxlab run (ansible-runner).
- name: Setup ntp-sync lab
  hosts: lab_target
  become: true
  gather_facts: false
  tasks:
    - name: Ensure chrony is installed (RHEL NTP client)
      ansible.builtin.dnf:
        name: chrony
        state: present

    - name: Desync at start (wrong timezone, NTP off, chronyd stopped/disabled)
      ansible.builtin.shell:
        cmd: |
          timedatectl set-timezone America/New_York
          timedatectl set-ntp false
          systemctl disable --now chronyd
        chdir: /
      changed_when: false

    - name: Brief the learner
      ansible.builtin.debug:
        msg: >-
          Horloge déréglée sur cette machine. L'état attendu est décrit par
          « dsoxlab challenge l4-ntp-sync », la méthode par
          « dsoxlab course l4-ntp-sync ». Aucune commande n'est donnée ici :
          les indices sont dans « dsoxlab hint l4-ntp-sync ».
