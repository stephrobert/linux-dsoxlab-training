---
# État initial : podman installé, image pré-tirée, aucune unité Quadlet weblab.
# L'apprenant écrit le .container et le démarre via systemd.
- name: Setup podman-systemd-persist lab
  hosts: lab_target
  become: true
  gather_facts: false
  tasks:
    - name: Ensure podman is installed
      ansible.builtin.dnf:
        name: podman
        state: present

    - name: Pre-pull the image
      ansible.builtin.command: podman pull -q registry.access.redhat.com/ubi9/ubi-micro
      changed_when: false

    - name: Clean slate — remove any Quadlet unit and container
      ansible.builtin.shell:
        cmd: |
          systemctl stop weblab.service 2>/dev/null || true
          rm -f /etc/containers/systemd/weblab.container
          systemctl daemon-reload
          podman rm -f weblab 2>/dev/null || true
        chdir: /
      changed_when: false

    - name: Brief the learner
      ansible.builtin.debug:
        msg: >-
          podman est installé et l'image registry.access.redhat.com/ubi9/ubi-micro
          a été pré-tirée localement : aucun accès au registre n'est nécessaire.
          La machine part d'un état vierge, aucune unité ni aucun conteneur de
          lab ne subsiste. L'état attendu est décrit par
          « dsoxlab challenge l4-podman-systemd-persist », la méthode par
          « dsoxlab course l4-podman-systemd-persist ». Aucune commande n'est
          donnée ici : les indices sont dans
          « dsoxlab hint l4-podman-systemd-persist ».
