---
# État initial : httpd sert /var/www/html, mais index.html a été mal étiqueté
# (admin_home_t) → SELinux refuse la lecture par httpd (403) et logge un AVC.
# L'apprenant diagnostique via ausearch puis restaure le contexte.
- name: Setup selinux-diagnose-avc lab
  hosts: lab_target
  become: true
  gather_facts: false
  tasks:
    - name: Ensure httpd is installed
      ansible.builtin.dnf:
        name: httpd
        state: present

    - name: Create web content, mislabel it, start httpd and trigger the denial
      ansible.builtin.shell:
        cmd: |
          echo '<h1>lab avc</h1>' > /var/www/html/index.html
          chcon -t admin_home_t /var/www/html/index.html
          systemctl enable --now httpd
          # Provoque le refus une fois pour qu'il soit dans le journal d'audit.
          curl -s -o /dev/null http://localhost/index.html || true
        chdir: /
      changed_when: false

    - name: Brief the learner
      ansible.builtin.debug:
        msg: >-
          httpd est installé, démarré et activé au démarrage, le contenu web est
          en place, et http://localhost renvoie 403. Une requête a déjà été jouée
          au moment de la préparation : la trace de l'incident est donc déjà dans
          le journal du système. SELinux doit rester enforcing du début à la fin.
          L'état attendu est décrit par
          « dsoxlab challenge l4-selinux-diagnose-avc », la méthode par
          « dsoxlab course l4-selinux-diagnose-avc ». Aucune commande n'est
          donnée ici : les indices sont dans
          « dsoxlab hint l4-selinux-diagnose-avc ».
