---
# État initial : pas de connexion statique de lab. L'apprenant crée le profil
# NetworkManager persistant. On travaille sur une interface dédiée (lab0) pour
# ne jamais couper l'interface de gestion. Joué par dsoxlab run.
- name: Setup network-static-persist lab
  hosts: lab_target
  become: true
  gather_facts: false
  tasks:
    - name: Clean slate — remove any prior lab connection
      ansible.builtin.shell:
        cmd: nmcli con delete lab-static 2>/dev/null || true
        chdir: /
      changed_when: false

    - name: Brief the learner
      ansible.builtin.debug:
        msg: >-
          Crée une connexion NetworkManager PERSISTANTE nommée « lab-static » sur
          l'interface dédiée lab0 (type dummy), avec l'IPv4 STATIQUE
          192.0.2.50/24 (ipv4.method manual), puis active-la. Ne touche pas à
          l'interface de gestion. Vérifie avec nmcli con show lab-static.
