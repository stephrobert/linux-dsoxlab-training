id: l4-ssh-key-auth-harden
title: "Set up hardened key-based SSH access for a service user"
description: "Give the deploy user key-based SSH login with correct ownership and permissions (.ssh 700, authorized_keys 600, owned by the user) — the classic trap that silently breaks key auth."
section: linux
lab_type: lab
level: l4
track:
  - securiser
skills:
  - ssh
  - authorized_keys
  - permissions
  - key-based-auth
difficulty: intermediate
estimated_time: 20m
runtime:
  type: vm
  # On reste sur le poste : c'est à l'apprenant de taper son ssh vers
  # la machine du lab, et dsoxlab n'est installé que sur le poste.
  session: local
  default: rhel
  snapshot_required: false
  targets:
    - name: rhel
      host: alma-rhcsa-1.lab
      label_en: "AlmaLinux 10 (sshd, authorized_keys)"
      label_fr: "AlmaLinux 10 (sshd, authorized_keys)"
distros:
  - rhel10
  - almalinux10
doc_url: https://blog.stephane-robert.info/docs/admin-serveurs/linux/exploiter/ssh/cle-ssh/
validation:
  functional: true
  security: true
  persistence_after_reboot: false
certification_tags:
  - rhcsa
