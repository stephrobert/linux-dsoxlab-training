---
# État initial : SELinux enforcing, outils semanage installés, booléen OFF et
# port 8404 NON étiqueté. L'apprenant accorde les deux, durablement.
- name: Setup selinux-boolean-port lab
  hosts: lab_target
  become: true
  gather_facts: false
  tasks:
    - name: Ensure SELinux management tools
      ansible.builtin.dnf:
        name:
          - policycoreutils-python-utils
          - setools-console
        state: present

    - name: Reset to clean initial state (boolean off, port unlabeled)
      ansible.builtin.shell:
        cmd: |
          setsebool -P httpd_can_network_connect off
          semanage port -d -t http_port_t -p tcp 8404 2>/dev/null || true
        chdir: /
      changed_when: false

    - name: Brief the learner
      ansible.builtin.debug:
        msg: >-
          SELinux est en mode enforcing et les outils d'administration de la
          policy sont installés. La policy a été remise à son état de départ.
          SELinux doit rester enforcing du début à la fin. L'état attendu est
          décrit par « dsoxlab challenge l4-selinux-boolean-port », la méthode
          par « dsoxlab course l4-selinux-boolean-port ». Aucune commande n'est
          donnée ici : les indices sont dans
          « dsoxlab hint l4-selinux-boolean-port ».
