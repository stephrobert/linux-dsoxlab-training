---
# Reset idempotent : booléen off + port retiré, pour rejouabilité.
- name: Cleanup selinux-boolean-port lab
  hosts: lab_target
  become: true
  gather_facts: false
  tasks:
    - name: Revert the boolean and the port label
      ansible.builtin.shell:
        cmd: |
          setsebool -P httpd_can_network_connect off 2>/dev/null || true
          semanage port -d -t http_port_t -p tcp 8404 2>/dev/null || true
        chdir: /
      changed_when: false
