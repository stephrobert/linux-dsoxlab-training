---
# État initial : firewalld actif, ssh autorisé (accès de gestion), mais http
# FERMÉ. L'apprenant ouvre http de façon permanente. On ne retire jamais ssh.
- name: Setup firewall-persist lab
  hosts: lab_target
  become: true
  gather_facts: false
  tasks:
    - name: Ensure firewalld is installed
      ansible.builtin.dnf:
        name: firewalld
        state: present

    - name: Enable and start firewalld
      ansible.builtin.systemd_service:
        name: firewalld
        enabled: true
        state: started

    - name: Ensure http is closed at start (clean initial state)
      ansible.builtin.shell:
        cmd: |
          firewall-cmd --permanent --remove-service=http 2>/dev/null || true
          firewall-cmd --reload
        chdir: /
      changed_when: false

    - name: Brief the learner
      ansible.builtin.debug:
        msg: >-
          firewalld est installé, actif et activé au démarrage. Le service ssh
          reste autorisé : c'est l'accès de gestion de la machine, ne le ferme
          jamais. Le reste du filtrage a été remis à son état de départ. L'état
          attendu est décrit par « dsoxlab challenge l4-firewall-persist », la
          méthode par « dsoxlab course l4-firewall-persist ». Aucune commande
          n'est donnée ici : les indices sont dans
          « dsoxlab hint l4-firewall-persist ».
