      host: ubuntu-lfcs-1.lab
      label_en: "Ubuntu 24.04 (XFS quotas on /dev/vdb)"
      label_fr: "Ubuntu 24.04 (quotas XFS sur /dev/vdb)"
distros:
  - ubuntu24.04
  - debian12
  - rhel10
