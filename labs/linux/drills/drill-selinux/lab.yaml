id: drill-selinux
title: "Drill — SELinux under exam conditions"
description: "4 tasks, 100 points, 20 minutes, no hints: put SELinux back in enforcing for good, fix a file context so it survives a relabel, flip a boolean persistently, and label a non-standard port. RHCSA only — Debian uses AppArmor, see drill-apparmor."
section: drills
bloc_order: 7
lab_type: challenge
level: l4
track:
  - securiser
skills:
  - selinux
  - selinux-contexts
  - selinux-booleans
  - selinux-ports
difficulty: advanced
estimated_time: 20m

# Drill MONO-DISTRIB, et c'est assumé : SELinux et AppArmor ne sont pas deux
# outils pour le même geste, ce sont deux modèles. Les mutualiser produirait un
# sujet contorsionné. RHCSA a celui-ci, LFCS a drill-apparmor.
#
# Sondé : semanage est ABSENT de l'image alma (paquet
# policycoreutils-python-utils), le setup le fournit — c'est de l'outillage,
# sans quoi trois des quatre tâches seraient infaisables.
runtime:
  type: vm
  # On reste sur le poste : c'est à l'apprenant de taper son ssh vers
  # la machine du lab, et dsoxlab n'est installé que sur le poste.
  session: local
  default: rhel
  snapshot_required: false
  targets:
    - name: rhel
      host: alma-rhcsa-1.lab
      label_en: "AlmaLinux 10 — SELinux enforcing (RHCSA)"
      label_fr: "AlmaLinux 10 — SELinux enforcing (RHCSA)"

distros:
  - almalinux10
  - rhel10
doc_url: https://blog.stephane-robert.info/docs/admin-serveurs/linux/
validation:
  functional: true
  security: true
  persistence_after_reboot: true
certification_tags:
  - rhcsa

exam_passing_score: 70
