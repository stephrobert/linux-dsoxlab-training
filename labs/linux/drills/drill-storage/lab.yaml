id: drill-storage
title: "Drill — partitions, LVM and swap under exam conditions"
description: "5 tasks, 100 points, 25 minutes, no hints: partition a disk in GPT, build an LVM stack, mount by UUID persistently, add swap, and extend a logical volume online. Playable on RHEL or Debian — parted, LVM and XFS are identical."
section: linux
type: challenge
level: l2
track:
  - stockage
skills:
  - partitioning-gpt
  - lvm
  - filesystems-xfs
  - fstab
  - swap
  - online-resize
difficulty: advanced
estimated_time: 25m

# Drill BI-DISTRIB : parted, LVM, XFS, mkswap se comportent à l'identique sur
# RHEL et Debian. Le setup installe lvm2/xfsprogs (mêmes noms de paquets sur
# les deux) et remet /dev/vdb à blanc, LVM compris.
runtime:
  type: vm
  default: rhel
  snapshot_required: false
  targets:
    - name: rhel
      host: alma-rhcsa-1.lab
      label_en: "AlmaLinux 10 (RHCSA) — /dev/vdb"
      label_fr: "AlmaLinux 10 (RHCSA) — /dev/vdb"
    - name: ubuntu
      host: ubuntu-lfcs-1.lab
      label_en: "Ubuntu 24.04 (LFCS) — /dev/vdb"
      label_fr: "Ubuntu 24.04 (LFCS) — /dev/vdb"

distros:
  - almalinux10
  - rhel10
  - ubuntu24.04
  - debian12
doc_url: https://blog.stephane-robert.info/docs/admin-serveurs/linux/stockage/lvm/
validation:
  functional: true
  security: false
  persistence_after_reboot: true
certification_tags:
  - rhcsa
  - lfcs

exam_passing_score: 70
