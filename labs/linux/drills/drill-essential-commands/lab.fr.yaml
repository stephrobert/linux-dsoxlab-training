id: drill-essential-commands
title: "Drill — commandes essentielles en conditions d'examen"
description: "5 tâches, 100 points, 20 minutes, aucun indice : chercher par taille, bâtir un rapport de fréquence, créer des liens, corriger propriétaire et permissions, et séparer stdout de stderr. Jouable sur RHEL ou Debian — ces compétences sont identiques."
