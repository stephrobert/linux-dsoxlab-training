id: l2-swap-management
title: "Add and manage swap space"
description: "Create a secure swap file, activate it, make it persistent in /etc/fstab and tune vm.swappiness."
section: linux
type: lab
level: l2
track:
  - stockage
skills:
  - swap
  - mkswap-swapon
  - fstab
  - sysctl
difficulty: intermediate
estimated_time: 25m
runtime:
  type: vm
  # On reste sur le poste : c'est à l'apprenant de taper son ssh vers
  # la machine du lab, et dsoxlab n'est installé que sur le poste.
  session: local
  default: rhel
  snapshot_required: false
  targets:
    - name: rhel
      host: alma-rhcsa-1.lab
      label_en: "AlmaLinux 10 (mkswap, swapon, fstab, sysctl)"
      label_fr: "AlmaLinux 10 (mkswap, swapon, fstab, sysctl)"
distros:
  - rhel10
  - almalinux10
  - ubuntu24.04
doc_url: https://blog.stephane-robert.info/docs/admin-serveurs/linux/stockage/swap/
validation:
  functional: true
  security: true
  persistence_after_reboot: true
certification_tags:
  - rhcsa
  - lfcs
