id: l2-repo-configure
title: "Configure a dnf repository with a .repo file"
description: "Add a software repository under /etc/yum.repos.d: an id, a baseurl, enabled and GPG-checked, then confirm dnf sees it."
section: linux
lab_type: lab
level: l2
track:
  - administration
skills:
  - dnf
  - yum.repos.d
  - repository
  - gpgcheck
difficulty: intermediate
estimated_time: 20m
runtime:
  type: vm
  # On reste sur le poste : c'est à l'apprenant de taper son ssh vers
  # la machine du lab, et dsoxlab n'est installé que sur le poste.
  session: local
  default: rhel
  snapshot_required: false
  targets:
    - name: rhel
      host: alma-rhcsa-1.lab
      label_en: "AlmaLinux 10 (/etc/yum.repos.d, dnf repolist)"
      label_fr: "AlmaLinux 10 (/etc/yum.repos.d, dnf repolist)"
distros:
  - rhel10
  - almalinux10
doc_url: https://blog.stephane-robert.info/docs/admin-serveurs/linux/maintenir/paquets/dnf/
validation:
  functional: true
  security: true
  persistence_after_reboot: false
certification_tags:
  - rhcsa
