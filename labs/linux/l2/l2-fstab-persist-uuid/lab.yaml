id: l2-fstab-persist-uuid
title: "Mount a filesystem persistently by UUID in /etc/fstab"
description: "Mount a pre-formatted extra disk at /srv/data through /etc/fstab, referenced by UUID (not device name) so it survives a reboot and passes mount -a."
section: linux
type: lab
level: l2
