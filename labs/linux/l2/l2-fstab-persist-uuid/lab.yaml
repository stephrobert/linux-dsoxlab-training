estimated_time: 25m
runtime:
  type: vm
  default: rhel
  snapshot_required: false
  targets:
    - name: rhel
      host: alma-rhcsa-1.lab
      label_en: "AlmaLinux 10 (blkid, /etc/fstab UUID, mount -a)"
      label_fr: "AlmaLinux 10 (blkid, /etc/fstab UUID, mount -a)"
distros:
  - rhel10
  - almalinux10
  - ubuntu24.04
doc_url: https://blog.stephane-robert.info/docs/admin-serveurs/linux/stockage/montage-persistance/
validation:
  functional: true
  security: false
  persistence_after_reboot: true
