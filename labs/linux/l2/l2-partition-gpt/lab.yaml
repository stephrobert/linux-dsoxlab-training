id: l2-partition-gpt
title: "Create GPT partitions on a disk with parted"
description: "Put a GPT label on the spare disk and carve two partitions (512 MiB and 1 GiB), then make the kernel re-read the table."
section: l2
lab_type: lab
level: l2
track:
  - stockage
skills:
  - parted
  - gpt
  - partitions
  - partprobe
difficulty: intermediate
estimated_time: 25m
runtime:
  type: vm
  # On reste sur le poste : c'est à l'apprenant de taper son ssh vers
  # la machine du lab, et dsoxlab n'est installé que sur le poste.
  session: local
  default: rhel
  snapshot_required: false
  targets:
    - name: rhel
      host: alma-rhcsa-1.lab
      label_en: "AlmaLinux 10 (parted, GPT, partprobe)"
      label_fr: "AlmaLinux 10 (parted, GPT, partprobe)"
distros:
  - rhel10
  - almalinux10
  - ubuntu24.04
doc_url: https://blog.stephane-robert.info/docs/admin-serveurs/linux/stockage/partitions/
validation:
  functional: true
  security: false
  persistence_after_reboot: false
certification_tags:
  - rhcsa
  - lfcs
