id: l2-package-management
title: "Install, remove and query packages with dnf"
description: "Bring the machine to a target software state: install a needed package, remove an unwanted one, and confirm with dnf/rpm queries."
section: l2
lab_type: lab
level: l2
track:
  - administration
skills:
  - dnf
  - rpm
  - packages
difficulty: intermediate
estimated_time: 20m
runtime:
  type: vm
  # On reste sur le poste : c'est à l'apprenant de taper son ssh vers
  # la machine du lab, et dsoxlab n'est installé que sur le poste.
  session: local
  default: rhel
  snapshot_required: false
  targets:
    - name: rhel
      host: alma-rhcsa-1.lab
      label_en: "AlmaLinux 10 (dnf install/remove, rpm -q)"
      label_fr: "AlmaLinux 10 (dnf install/remove, rpm -q)"
distros:
  - rhel10
  - almalinux10
doc_url: https://blog.stephane-robert.info/docs/admin-serveurs/linux/maintenir/paquets/dnf/
validation:
  functional: true
  security: false
  persistence_after_reboot: false
certification_tags:
  - rhcsa
