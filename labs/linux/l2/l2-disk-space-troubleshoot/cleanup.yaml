---
# Reset idempotent : démonte /srv/data et efface le FS. Joué par dsoxlab clean.
- name: Cleanup disk-space-troubleshoot lab
  hosts: lab_target
  become: true
  gather_facts: false
  tasks:
    - name: Unmount /srv/data if mounted
      ansible.builtin.command: umount /srv/data
      changed_when: false
      failed_when: false

    - name: Wipe the filesystem on the target partition
      ansible.builtin.shell: |
        . /root/dsk-disk.env 2>/dev/null || exit 0
        part="${DISK}1"; [ -b "$part" ] || part="${DISK}p1"
        wipefs -a "$part" 2>/dev/null || true
      changed_when: false

    - name: Remove the mount point and ready marker
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /srv/data
        - /root/.dsk-lab-ready
