---
# État initial : un compte 'bob' avec l'expiration par défaut, login.defs et
# pwquality d'origine. L'apprenant durcit la politique. Joué par dsoxlab run.
- name: Setup password-policy lab
  hosts: lab_target
  become: true
  gather_facts: false
  tasks:
    - name: Ensure libpwquality (pwquality.conf)
      ansible.builtin.package:
        name: libpwquality
        state: present

    - name: Create user bob (default aging)
      ansible.builtin.user:
        name: bob
        shell: /bin/bash
        create_home: true

    - name: Reset bob aging to defaults (no policy yet)
      ansible.builtin.command: chage -M 99999 -m 0 -W 7 bob
      changed_when: false

    - name: Ensure PASS_MAX_DAYS default is loose (99999) at start
      ansible.builtin.lineinfile:
        path: /etc/login.defs
        regexp: '^\s*PASS_MAX_DAYS'
        line: "PASS_MAX_DAYS\t99999"

    - name: Loosen pwquality minlen at start (so the learner must tighten it)
      ansible.builtin.lineinfile:
        path: /etc/security/pwquality.conf
        regexp: '^\s*#?\s*minlen'
        line: "minlen = 6"

    - name: Brief the learner
      ansible.builtin.debug:
        msg: >-
          Durcis la politique de mots de passe : pour bob, âge max 60 j, min 7 j,
          avertissement 7 j (chage). Passe le défaut système PASS_MAX_DAYS à 60
          dans /etc/login.defs. Exige une longueur mini de 12 dans
          /etc/security/pwquality.conf (minlen).
